<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Autenticando...</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f; color: #e8e8f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; padding: 24px; text-align: center;
    }
    .spin { width: 40px; height: 40px; border: 3px solid rgba(145,71,255,0.3); border-top-color: #9147ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 16px; color: #9147ff; font-weight: 700; }
    .sub   { font-size: 11px; color: #6b6b80; }
    .ok    { color: #00e5a0; font-size: 20px; }
    .err   { color: #ff3c5f; font-size: 14px; }
  </style>
</head>
<body>
  <div id="content">
    <div class="spin"></div>
    <div class="title">Autenticando com Twitch...</div>
    <div class="sub">Esta janela fechará em breve.</div>
  </div>

  <script>
  (function () {
    'use strict';

    const ALLOWED_ORIGIN = 'https://asrus21.github.io';

    const params = new URLSearchParams(window.location.search);
    const login  = params.get('login');
    const uuid   = params.get('uuid');

    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function show(html) {
      document.getElementById('content').innerHTML = html;
    }

    function closeAfter(ms) {
      setTimeout(() => window.close(), ms);
    }

    function isValidUUID(str) {
      return typeof str === 'string' && /^[a-f0-9]{32}$/.test(str);
    }

    if (login === 'success' && isValidUUID(uuid)) {
      show(`<div class="ok">✓</div><div class="title">Login realizado!</div><div class="sub">Fechando...</div>`);

      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage(
            { type: 'twitch-login-success', uuid },
            ALLOWED_ORIGIN
          );
        } catch (e) {
          try { sessionStorage.setItem('_sr_pending_uuid', uuid); } catch (_) {}
        }
        closeAfter(800);
      } else {
        try { sessionStorage.setItem('_sr_pending_uuid', uuid); } catch (_) {}
        setTimeout(() => {
          window.location.replace(ALLOWED_ORIGIN + '/Song-Request-Queue/');
        }, 600);
      }

    } else if (login === 'error') {
      show(`<div class="err">✗ Erro na autenticação com Twitch.<br>Feche esta janela e tente novamente.</div>`);
      if (window.opener && !window.opener.closed) {
        try { window.opener.postMessage({ type: 'twitch-login-error' }, ALLOWED_ORIGIN); } catch (_) {}
      }
      closeAfter(3000);

    } else {
      show(`<div class="err">Acesso inválido.<br>Feche esta janela.</div>`);
      closeAfter(3000);
    }
  })();
  </script>
</body>
</html>
